    <meta property="og:title" content="Événements - Moov'Ensemble">
    <meta property="og:description" content="Événements et camps journées organisés par Moov'Ensemble. Retrouvez nos prochains événements sportifs ouverts à tous, enfants, adultes et seniors.">
    <meta property="og:url" content="https://www.moovensemble.ch/pages/evenements.html">

    <meta property="og:locale" content="fr_FR">
    <meta property="og:site_name" content="Moov'Ensemble">
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="../assets/images/logo/petit-logo_sans_fond.png">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <!-- Ton CSS principal -->
    <link rel="stylesheet" href="../css/styles.css">
    <!-- Font Awesome pour icônes -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-contact">

<!-- Header / Navbar -->
<script src="../components/navbar.js"></script>
<moov-navbar></moov-navbar>

<!-- Logo central -->
<script src="../components/logo.js"></script>
<moov-logo data-base="../"></moov-logo>

<!-- Section Événements -->
<section class="events-section">
    <h1>Événements à venir</h1>
    <p class="intro">Découvrez nos prochains camps, journées sportives et ateliers. Inscriptions via le formulaire de contact !</p>

    <!-- Conteneur dynamique pour les cartes (les cartes seront injectées ici via JS) -->
    <div class="events-container row g-4">
        <!-- Les event-card apparaîtront automatiquement ici -->
    </div>
</section>

<!-- Footer -->
<script src="../components/footer.js"></script>
<moov-footer></moov-footer>

<!-- Bouton retour en haut -->
<button class="scroll-to-top" id="scrollToTop" title="Retour en haut">
    <i class="fas fa-chevron-up"></i>
</button>

<!-- Scripts -->
<script src="../js/main.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
<!-- Script retour en haut -->
<script src="../js/scroll-top.js"></script>

<!-- Script dynamique pour charger les événements depuis data/events.js -->
<script type="module">
  import { eventsData } from '../data/events.js';

  const container = document.querySelector('.events-container');
  const today = new Date();
  today.setHours(0, 0, 0, 0); // Minuit pour comparer juste la date

  // Fonction pour déterminer si un événement est futur
  function isFuture(event) {
    // Si status est défini, il a priorité
    if (event.status === "future") return true;
    if (event.status === "past") return false;
    // Sinon, on compare avec endDate
    if (!event.endDate) return false;
    const eventDate = new Date(event.endDate);
    return eventDate >= today;
  }

  // Filtre les événements futurs (automatique ou forcé)
  const futureEvents = eventsData.filter(isFuture);

  if (futureEvents.length === 0) {
    container.innerHTML = `
      <div class="no-events col-12 text-center py-5">
        Aucun événement programmé pour le moment.<br>
        Restez connecté ou contactez-nous pour des propositions !
      </div>
    `;
  } else {
    futureEvents.forEach(event => {
      const card = document.createElement('div');
      card.className = 'event-card col-md-6 col-lg-4'; // Bootstrap : 2 sur tablette, 3 sur desktop
      card.innerHTML = `
        <div class="event-card__content p-4 bg-white rounded shadow-sm">
          <h2 class="event-card__title h4 mb-3">${event.title}</h2>
          <div class="event-meta mb-3 text-muted">
            <span class="event-date"><i class="fas fa-calendar-alt"></i> ${event.date}</span>
            <span class="event-location"><i class="fas fa-map-marker-alt"></i> ${event.location}</span>
          </div>
          <p class="mb-4">${event.description}</p>
          <a href="contact.html?event=${encodeURIComponent(event.title)}&date=${encodeURIComponent(event.date)}" class="btn-primary d-inline-block px-4 py-2">S'inscrire / Plus d'infos</a>
        </div>
      `;
      container.appendChild(card);
    });
  }
</script>
<!-- Bannière Cookies -->
<script src="../js/cookies.js"></script>

</body>
</html>
