<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galerie</title>
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="../assets/images/logo/petit-logo_sans_fond.png">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <!-- Ton CSS principal -->
    <link rel="stylesheet" href="../css/styles.css">
    <!-- Font Awesome pour icônes -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- GLightbox CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/glightbox/dist/css/glightbox.min.css">
</head>
<body>

<!-- Header / Navbar -->
<script src="../components/navbar.js"></script>
<moov-navbar></moov-navbar>

<!-- Logo central -->
<script src="../components/logo.js"></script>
<moov-logo data-base="../"></moov-logo>

<!-- Section Galerie -->
<main class="main">
    <section class="gallery-section">
        <h1>Galerie Moov'Ensemble</h1>
        <p class="intro">Souvenirs de nos camps, journées sportives, ateliers et moments partagés !</p>

        <!-- Conteneur dynamique pour les sections de galerie -->
        <div class="gallery-container">
            <!-- Les <section class="event-gallery"> apparaîtront automatiquement ici via JS -->
        </div>
    </section>
</main>

<!-- Footer -->
<script src="../components/footer.js"></script>
<moov-footer></moov-footer>

<!-- Bouton retour en haut -->
<button class="scroll-to-top" id="scrollToTop" title="Retour en haut">
    <i class="fas fa-chevron-up"></i>
</button>

<!-- Scripts -->
<script src="../js/main.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
<!-- Script retour en haut -->
<script src="../js/scroll-top.js"></script>
<!-- GLightbox JS -->
<script src="https://cdn.jsdelivr.net/npm/glightbox/dist/js/glightbox.min.js"></script>

<!-- Script dynamique pour charger les galeries depuis data/events.js -->
<script type="module">
  import { eventsData } from '../data/events.js';

  const container = document.querySelector('.gallery-container');
  const today = new Date();
  today.setHours(0, 0, 0, 0); // Minuit pour comparer juste la date

  // Fonction pour déterminer si un événement est passé
  function isPast(event) {
    // Si status est défini, il a priorité
    if (event.status === "past") return true;
    if (event.status === "future") return false;
    // Sinon, on compare avec endDate
    if (!event.endDate) return false;
    const eventDate = new Date(event.endDate);
    return eventDate < today;
  }

  // Filtre les événements passés (automatique ou forcé)
  const pastEvents = eventsData.filter(isPast);

  if (pastEvents.length === 0) {
    container.innerHTML = `
      <div class="no-content col-12 text-center py-5">
        Aucune photo ou vidéo pour le moment…<br>Bientôt les premiers souvenirs !
      </div>
    `;
  } else {
    pastEvents.forEach(event => {
      const images = event.galleryImages || [];
      const videos = event.galleryVideos || [];
      const totalMedia = images.length + videos.length;
      const hasMedia = totalMedia > 0;
      const firstImage = images[0];
      const firstVideo = videos[0];

      const section = document.createElement('section');
      section.className = 'event-gallery mb-5';
      section.innerHTML = `
        <h2>${event.title}</h2>
        <p class="event-date mb-4">${event.date} – ${event.location}</p>

        ${hasMedia ? `
        <div class="gallery-cover-wrapper">
          <!-- Image principale cliquable -->
          <a href="${firstImage || firstVideo}" class="glightbox gallery-cover-link" data-gallery="gallery-${event.id}" data-glightbox="title: ${event.title}">
            ${firstImage ? `
            <img src="${firstImage}" alt="${event.title}" class="gallery-cover-img">
            ` : `
            <video src="${firstVideo}" class="gallery-cover-img" muted preload="metadata"></video>
            <div class="video-play-overlay">
              <i class="fa-solid fa-play"></i>
            </div>
            `}
            <!-- Badge compteur -->
            <div class="gallery-media-count">
              ${images.length > 0 ? `<span><i class="fa-solid fa-camera"></i> ${images.length}</span>` : ''}
              ${videos.length > 0 ? `<span><i class="fa-solid fa-video"></i> ${videos.length}</span>` : ''}
            </div>
            <div class="gallery-cover-overlay">
              <span>Voir la galerie</span>
            </div>
          </a>

          <!-- Liens cachés pour les autres médias (pour GLightbox navigation) -->
          <div class="gallery-hidden-links">
            ${images.slice(1).map(img => `
              <a href="${img}" class="glightbox" data-gallery="gallery-${event.id}" data-glightbox="title: ${event.title}"></a>
            `).join('')}
            ${(firstImage ? videos : videos.slice(1)).map(video => `
              <a href="${video}" class="glightbox" data-gallery="gallery-${event.id}" data-glightbox="title: ${event.title}"></a>
            `).join('')}
          </div>
        </div>
        ` : '<p class="text-center text-muted py-4"><i class="fa-solid fa-camera me-2"></i>Photos et vidéos arrivent bientôt !</p>'}
      `;
      container.appendChild(section);
    });

    // Initialiser GLightbox après avoir ajouté tous les éléments
    GLightbox({
      selector: '.glightbox',
      touchNavigation: true,
      loop: true,
      closeButton: true,
      svg: {
        close: '<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"><path fill="currentColor" d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>',
        next: '<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"><path fill="currentColor" d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6z"/></svg>',
        prev: '<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"><path fill="currentColor" d="M15.41 16.59L10.83 12l4.58-4.59L14 6l-6 6 6 6z"/></svg>'
      }
    });
  }
</script>
<!-- Bannière Cookies -->
<script src="../js/cookies.js"></script>

</body>
</html>
