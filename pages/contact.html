<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulaire de contact</title>
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="../assets/images/logo/petit-logo_sans_fond.png">
    <!--Bootstrap-->
     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
     <!--CSS-->
     <link rel="stylesheet" href="../css/styles.css">
     <!--Icône Instagram-->
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-contact">
 <!--Header-->
<script src="../components/navbar.js"></script>
<moov-navbar></moov-navbar>
  
<!--Logo-->
<script src="../components/logo.js"></script>
<moov-logo data-base="../"></moov-logo>
    
    <!--Contact Form-->
    <section class="contact-section-simple">
        <div class="contact-card">
            <h1>Contactez-nous</h1>
            
            <form name="contact" method="POST" data-netlify="true" netlify-honeypot="bot-field">
                <input type="hidden" name="form-name" value="contact">
                
                <!-- Honeypot anti-spam (invisible pour les humains) -->
                <p class="hidden-field">
                    <label>Ne pas remplir : <input name="bot-field"></label>
                </p>

                <!-- Nom complet -->
                <div class="form-field">
                    <label>PRÉNOM ET NOM *</label>
                    <input type="text" name="name" placeholder="Entrez votre nom" required>
                </div>

                <!-- Email et Téléphone sur la même ligne -->
                <div class="form-row">
                    <div class="form-field">
                        <label>EMAIL *</label>
                        <input type="email" name="email" placeholder="Entrez votre email" required>
                    </div>
                    <div class="form-field">
                        <label>TÉLÉPHONE</label>
                        <input type="tel" name="phone" placeholder="Entrez votre numéro">
                    </div>
                </div>

                <!-- Sujet -->
                <div class="form-field">
                    <label>SUJET *</label>
                    <input type="text" name="subject" placeholder="Sujet de votre message" required>
                </div>

                <!-- Message -->
                <div class="form-field">
                    <label>MESSAGE *</label>
                    <textarea name="message" placeholder="Votre message ici..." rows="6" required></textarea>
                </div>

                <!-- Bouton Submit -->
                <button type="submit" class="btn-submit-simple">
                    Envoyer <span>→</span>
                </button>
            </form>
            <div class="download-info-box">
    <div class="download-icon">📄</div>
    <h4>Fiche d'inscription</h4>
    <p>Téléchargez et remplissez notre formulaire d'inscription pour rejoindre nos activités.</p>
    <a href="../assets/documents/formulaire-inscription-v2.pdf" download class="btn-download-box">
        Télécharger le PDF
    </a>
             </div>
</div>
    </section>


<!--Footer-->
<script src="../components/footer.js"></script>
<moov-footer></moov-footer>

<!-- Bouton retour en haut -->
<button class="scroll-to-top" id="scrollToTop" title="Retour en haut">
    <i class="fas fa-chevron-up"></i>
</button>

<script src="../js/main.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <!-- Script retour en haut -->
    <script src="../js/scroll-top.js"></script>
    <!-- Bannière Cookies -->
    <script src="../js/cookies.js"></script>

    <!-- Script pré-remplissage formulaire depuis planning ou événements -->
    <script>
        const params = new URLSearchParams(window.location.search);
        const cours = params.get('cours');
        const age = params.get('age');
        const event = params.get('event');
        const date = params.get('date');

        if (cours) {
            document.querySelector('input[name="subject"]').value =
                `Inscription / Information - ${cours}`;
            document.querySelector('textarea[name="message"]').value =
                `Bonjour,\n\nJe souhaite m'inscrire ou recevoir plus d'informations sur les cours de ${cours}${age ? ` (${age})` : ''}.\n\nMerci !`;
        } else if (event) {
            document.querySelector('input[name="subject"]').value =
                `Inscription / Information - ${event}`;
            document.querySelector('textarea[name="message"]').value =
                `Bonjour,\n\nJe souhaite m'inscrire ou recevoir plus d'informations sur l'événement "${event}"${date ? ` (${date})` : ''}.\n\nMerci !`;
        }
    </script>
</body>
</html>
